<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroLingo - Fresh News Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-center mb-8">🚀 AstroLingo Fresh News Test</h1>
        
        <!-- Level Selector -->
        <div class="flex justify-center gap-4 mb-8">
            <button onclick="setLevel('child')" id="child-btn" class="px-6 py-3 bg-pink-600 hover:bg-pink-700 rounded-lg transition-colors">
                👶 Child
            </button>
            <button onclick="setLevel('student')" id="student-btn" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                🎓 Student
            </button>
            <button onclick="setLevel('researcher')" id="researcher-btn" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors">
                🧑‍🔬 Researcher
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-400 mx-auto mb-4"></div>
            <p class="text-xl">Loading space news from the cosmos...</p>
        </div>

        <!-- Articles Container -->
        <div id="articles" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>

        <!-- Error State -->
        <div id="error" class="text-center py-12 hidden">
            <div class="text-6xl mb-4">🌌</div>
            <h2 class="text-2xl mb-4">Something went wrong</h2>
            <p class="text-red-400 mb-4" id="error-message"></p>
            <button onclick="fetchArticles()" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-lg">
                Try Again
            </button>
        </div>
    </div>

    <script>
        let currentLevel = 'student';
        let articles = [];

        async function fetchArticles() {
            try {
                showLoading();
                
                const response = await fetch('http://localhost:5000/api/articles/latest');
                const data = await response.json();
                
                if (data.success) {
                    articles = data.articles;
                    console.log(`✅ Loaded ${articles.length} fresh articles`);
                    await simplifyAllArticles();
                    displayArticles();
                } else {
                    throw new Error(data.error || 'Failed to fetch articles');
                }
            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
            }
        }

        async function simplifyAllArticles() {
            for (let article of articles) {
                try {
                    const response = await fetch(
                        `http://localhost:5000/api/articles/simplify?level=${currentLevel}&content=${encodeURIComponent(article.description)}`
                    );
                    const data = await response.json();
                    
                    if (data.success) {
                        article.simplifiedContent = data.simplifiedContent;
                    } else {
                        article.simplifiedContent = article.description; // Fallback
                    }
                } catch (error) {
                    console.error(`Error simplifying article:`, error);
                    article.simplifiedContent = article.description; // Fallback
                }
            }
        }

        function displayArticles() {
            const container = document.getElementById('articles');
            container.innerHTML = '';
            
            articles.forEach((article, index) => {
                const articleCard = `
                    <div class="bg-slate-800/50 rounded-xl overflow-hidden border border-purple-500/20 hover:scale-105 transition-transform duration-300" style="animation-delay: ${index * 0.1}s">
                        <img src="${article.imageUrl}" alt="${article.title}" class="w-full h-48 object-cover" 
                             onerror="this.src='https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=800&h=400&fit=crop'">
                        <div class="p-6">
                            <h3 class="text-xl font-semibold mb-3">${article.title}</h3>
                            <div class="text-sm text-purple-300 mb-4">
                                📅 ${new Date(article.publishedAt).toLocaleDateString()}
                            </div>
                            <div class="bg-slate-700/50 rounded-lg p-4 border-l-4 border-purple-400 mb-4">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-lg">${getLevelIcon(currentLevel)}</span>
                                    <span class="text-sm font-medium text-purple-300">${currentLevel.charAt(0).toUpperCase() + currentLevel.slice(1)} Level</span>
                                </div>
                                <p class="text-gray-300">${article.simplifiedContent || article.description}</p>
                            </div>
                            <a href="${article.link}" target="_blank" class="text-purple-400 hover:text-purple-300 font-medium">
                                Read Original Article →
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += articleCard;
            });
            
            hideLoading();
            container.classList.remove('hidden');
        }

        function setLevel(level) {
            currentLevel = level;
            
            // Update button styles
            document.querySelectorAll('button[id$="-btn"]').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-white');
            });
            document.getElementById(`${level}-btn`).classList.add('ring-2', 'ring-white');
            
            if (articles.length > 0) {
                showLoading();
                simplifyAllArticles().then(() => {
                    displayArticles();
                });
            }
        }

        function getLevelIcon(level) {
            const icons = { child: '👶', student: '🎓', researcher: '🧑‍🔬' };
            return icons[level] || '🎓';
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('articles').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('articles').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
        }

        // Initialize
        setLevel('student');
        fetchArticles();
    </script>
</body>
</html>
